name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Reassemble and decompress GDS
        run: |
          cat gds/tt_um_lincy_eyeriss.gds.gz.aa gds/tt_um_lincy_eyeriss.gds.gz.ab | gunzip > gds/tt_um_lincy_eyeriss.gds

      - name: Read top module name
        id: top_module
        run: |
          echo TOP_MODULE=`yq '.project.top_module' info.yaml` | tee $GITHUB_OUTPUT

      - name: Create and publish the GDS artifact
        uses: TinyTapeout/tt-gds-action/custom_gds@ttsky26a
        with:
          top_module: ${{ steps.top_module.outputs.TOP_MODULE }}
          gds_path: gds/${{ steps.top_module.outputs.TOP_MODULE }}.gds
          lef_path: lef/${{ steps.top_module.outputs.TOP_MODULE }}.lef
          verilog_path: src/top_level_design.v
          pdk: sky130A

precheck:
  needs: gds
  runs-on: ubuntu-24.04
  steps:
    - name: Run Tiny Tapeout Precheck
      uses: TinyTapeout/tt-gds-action/precheck@ttsky26a

viewer:
  needs: gds
  runs-on: ubuntu-24.04
  permissions:
    pages: write
    id-token: write
  steps:
    - uses: TinyTapeout/tt-gds-action/viewer@ttsky26a
